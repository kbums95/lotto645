<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 6/45 번호 생성기</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <header>
      <h1>로또 6/45</h1>
      <p style="text-align: center; opacity: 0.7; margin-bottom: var(--space-m);">행운의 번호 5세트를 생성합니다</p>
    </header>

    <section class="glass-card histogram-section">
      <h3>번호별 출현 빈도 (1회 ~ 1220회 누적)</h3>
      <div id="hot-numbers-container">
        <!-- 가장 많이 나온 숫자들인 여기에 삽입됩니다 -->
      </div>
      <div id="frequency-histogram">
        <!-- 히스토그램 바들이 여기에 삽입됩니다 -->
      </div>
      <div id="histogram-tooltip" class="tooltip hidden"></div>
    </section>

    <div class="glass-card">
      <div id="ball-container">
        <!-- 로또 번호 공들이 여기에 삽입됩니다 -->
      </div>
      
      <div class="controls">
        <button id="generate-btn">번호 생성하기</button>


      </div>
    </div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
